# W1206 07:39:38.547005  859338 warnings.go:70] would violate PodSecurity "restricted:latest": allowPrivilegeEscalation != false (container "post-job" must set securityContext.allowPrivilegeEscalation=false), unrestricted capabilities (container "post-job" must set securityContext.capabilities.drop=["ALL"]), runAsNonRoot != true (pod or container "post-job" must set securityContext.runAsNonRoot=true), seccompProfile (pod or container "post-job" must set securityContext.seccompProfile.type to "RuntimeDefault" or "Localhost")
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}"
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      name: "{{ .Release.Name }}"
      labels:
        app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
        helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    spec:
      restartPolicy: Never
      # serviceAccountName: default
      containers:
      - name: post-job
        # image: "bitnami/kubectl"
        image: "alpine:3.3"
        command: ["/bin/sleep","{{ default "10" .Values.sleepyTime }}"]
